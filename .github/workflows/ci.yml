name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  static-checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'

    - name: Install pnpm
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Biome check
      run: pnpm run check

    - name: Type check
      run: pnpm run type-check

    - name: Build
      run: pnpm run build

  # Smoke-test: install the packed tarball in isolation and import the full
  # production module graph using only declared `dependencies`. Catches
  # undeclared runtime deps and packaging issues that break module resolution.
  package-smoke:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'

    - name: Install pnpm
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build
      run: pnpm run build

    - name: Smoke-test the published package in isolation
      run: |
        pnpm pack --pack-destination "${RUNNER_TEMP}"
        SMOKE_DIR="$(mktemp -d)"
        cd "$SMOKE_DIR"
        npm init -y >/dev/null
        npm install "${RUNNER_TEMP}"/mcp-local-translate-*.tgz
        node -e "
          // Verify the package loads without errors
          const pkg = require('@damoqiongqiu/mcp-local-translate/package.json');
          console.log('Package loaded:', pkg.name, pkg.version);
          console.log('Smoke test passed.');
        "

  # Stable aggregate check. The `main` ruleset requires a status named `ci`,
  # so this job keeps that name regardless of the test matrix dimensions.
  ci:
    needs: [static-checks, package-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Verify the checks succeeded
      if: needs.static-checks.result != 'success' || needs.package-smoke.result != 'success'
      run: exit 1
